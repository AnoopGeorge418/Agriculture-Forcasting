services:
  # Backend Service
  - type: web
    name: agri-forecast-backend
    env: docker
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME # User will need to update this
    rootDir: backend
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: "*" # Update this with your Vercel URL later
      - key: MODELS_DIR
        value: models/
      - key: DATA_CLEANED
        value: data/cleaned/cleaned_prices.csv
      - key: DATA_FORECASTS
        value: data/forecasts/12_month_forecast.csv

